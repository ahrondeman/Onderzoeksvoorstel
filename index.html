<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactieve Gids: Onderzoeksvoorstel 2026</title>
    <style>
        :root {
            --primary: #003057; /* UA Blue */
            --secondary: #e31e24; /* UA Red */
            --bg: #f4f7f9;
            --text: #333;
            --white: #ffffff;
            --border: #d1d9e0;
            --sidebar-width: 300px;
            --font-size: 16px;
        }

        /* Dark Mode */
        body.dark-mode {
            --bg: #1a1a1b;
            --text: #e0e0e0;
            --white: #2d2d2e;
            --border: #404041;
            --primary: #4da3ff;
        }

        * { box-sizing: border-box; transition: background 0.3s, color 0.3s; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            font-size: var(--font-size);
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        #sidebar {
            width: var(--sidebar-width);
            background-color: var(--primary);
            color: white;
            padding: 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        #sidebar.hidden { display: none; }

        .sidebar-header { font-weight: bold; font-size: 1.2rem; margin-bottom: 20px; border-bottom: 1px solid rgba(255,255,255,0.2); padding-bottom: 10px; }
        
        .nav-item {
            padding: 12px 15px;
            margin: 5px 0;
            cursor: pointer;
            border-radius: 5px;
            background: rgba(255,255,255,0.05);
        }
        .nav-item:hover { background: rgba(255,255,255,0.15); }
        .nav-item.active { background: var(--secondary); font-weight: bold; }

        /* Content Area */
        #main-content {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Tabs */
        #tabs {
            display: flex;
            background: var(--white);
            border-bottom: 1px solid var(--border);
            padding: 0 20px;
        }
        .tab {
            padding: 15px 25px;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.85rem;
            letter-spacing: 1px;
        }
        .tab.active { border-bottom-color: var(--secondary); color: var(--secondary); }

        /* Section Content */
        #content-body {
            padding: 40px;
            overflow-y: auto;
            line-height: 1.6;
        }

        .section-pane { display: none; }
        .section-pane.active { display: block; }

        /* Typography & Components */
        h1 { color: var(--primary); margin-top: 0; }
        h2 { border-left: 4px solid var(--secondary); padding-left: 15px; margin-top: 30px; }
        .assignment-box { background: #fffde7; border: 1px solid #fff59d; padding: 20px; border-radius: 8px; color: #333; margin-bottom: 20px; }
        .theory-block { background: var(--white); border: 1px solid var(--border); padding: 25px; border-radius: 8px; margin-bottom: 20px; }
        .source { font-size: 0.8rem; color: #888; display: block; margin-top: 10px; font-style: italic; }
        .step-box { background: #e8f5e9; border-left: 5px solid #4caf50; padding: 15px; margin: 10px 0; }
        .example-box { background: #e3f2fd; border-left: 5px solid #2196f3; padding: 15px; margin: 10px 0; font-style: italic; }
        .warning-box { background: #ffebee; border-left: 5px solid #f44336; padding: 15px; margin: 10px 0; }

        /* Settings styles */
        .settings-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; max-width: 600px; }
        .setting-card { background: var(--white); border: 1px solid var(--border); padding: 15px; border-radius: 8px; }

        /* Compact/Expanded Logic */
        .compact .theory-block { padding: 10px; }
        
        /* Focus Mode Header */
        #focus-header {
            display: none;
            padding: 10px 20px;
            background: var(--primary);
            color: white;
            justify-content: space-between;
            align-items: center;
        }

        @media print {
            #sidebar, #tabs, .settings-grid { display: none !important; }
            #main-content { overflow: visible; }
            body { height: auto; }
        }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="sidebar-header">Onderzoeksvoorstel 2026</div>
    <div class="nav-item active" onclick="loadSection('titel')">Titel & Kernwoorden</div>
    <div class="nav-item" onclick="loadSection('introductie')">1. Introductie</div>
    <div class="nav-item" onclick="loadSection('vraagstelling')">2. Onderzoeksvraag</div>
    <div class="nav-item" onclick="loadSection('methodologie')">3. Methodologie</div>
    <div class="nav-item" onclick="loadSection('resultaten')">4. Verwachte Resultaten</div>
    <div class="nav-item" onclick="loadSection('referenties')">5. Referenties</div>
    <div style="margin-top: auto; padding-top: 20px;">
        <div class="nav-item" onclick="loadSection('settings')" style="background: rgba(0,0,0,0.2)">⚙️ Instellingen</div>
    </div>
</div>

<div id="main-content">
    <div id="focus-header">
        <span id="focus-title">Focus Mode</span>
        <button onclick="toggleFocus(false)" style="background: white; border: none; padding: 5px 10px; cursor: pointer;">Verlaat Focus</button>
    </div>

    <div id="tabs">
        <div class="tab active" onclick="showTab('opdracht')">📄 Opdracht</div>
        <div class="tab" onclick="showTab('theorie')">📚 Theorie</div>
        <div class="tab" onclick="showTab('toepassing')">🧩 Toepassing</div>
    </div>

    <div id="content-body">
        </div>
</div>

<script>
    // DATA STRUCTURE
    const sections = {
        titel: {
            title: "Titel & Kernwoorden",
            opdracht: `Kies een korte en krachtige titel die duidelijk maakt waar het onderzoek over gaat. Voeg eventueel een ondertitel toe om de specifieke focus van het onderzoek te verduidelijken. Kies 3-5 kernwoorden voor je onderzoeksvoorstel.`,
            theorie: [
                {
                    concept: "Kenmerken van een goede titel",
                    uitleg: "Een academische titel moet informatief en specifiek zijn. Het moet de onafhankelijke en afhankelijke variabelen of de centrale focus van het onderzoek reflecteren.",
                    praktijk: "Vermijd vage termen zoals 'Onderzoek naar...'. Gebruik actieve termen.",
                    bron: "College 3 - dia 14"
                }
            ],
            toepassing: {
                stappen: [
                    "Identificeer je hoofdonderwerp en je doelgroep.",
                    "Formuleer een werktitel.",
                    "Scherp de titel aan na het schrijven van je onderzoeksvraag."
                ],
                voorbeelden: ["De invloed van typografie op de leessnelheid bij dyslectische gebruikers in mobiele apps.", "Kleurpsychologie in medische interfaces: een studie naar patiëntvertrouwen."],
                fouten: ["Titel is te breed (bijv. 'Iets over UX').", "Titel bevat afkortingen die niet algemeen bekend zijn."]
            }
        },
        introductie: {
            title: "1. Introductie (3-4 pg.)",
            opdracht: `De basis voor je introductie is het uitgevoerde literatuur onderzoek. Je hebt de literatuur over het afgebakende thema doorgenomen en kritisch geanalyseerd. Wat werd er reeds onderzocht? Welke methoden werden er gebruikt? Wat zijn de beperkingen? Wie waren de deelnemers?`,
            theorie: [
                {
                    concept: "De Kennislacune (Research Gap)",
                    uitleg: "Dit is het 'gat' in de bestaande kennis. Je toont aan wat we nog NIET weten ondanks bestaand onderzoek.",
                    praktijk: "Zonder kennislacune is er geen noodzaak voor nieuw onderzoek.",
                    bron: "College 4 - dia 12"
                },
                {
                    concept: "Probleemstelling",
                    uitleg: "De probleemstelling verbindt de maatschappelijke context aan de wetenschappelijke noodzaak. Waarom is dit een probleem voor ontwerpers of gebruikers?",
                    praktijk: "Maak het relevant voor Productontwikkeling.",
                    bron: "College 4 - dia 15"
                }
            ],
            toepassing: {
                stappen: [
                    "Start breed: Wat is de huidige status-quo in het vakgebied?",
                    "Zoom in: Wat zijn de specifieke problemen of beperkingen van huidige ontwerpen?",
                    "Eindig bij de lacune: Wat ontbreekt er nog?",
                    "Gebruik minstens 5 wetenschappelijke bronnen (verplicht)."
                ],
                fouten: ["De introductie is een persoonlijke mening zonder bronnen.", "De link met productontwikkeling ontbreekt."]
            }
        },
        vraagstelling: {
            title: "2. Onderzoeksvraag",
            opdracht: `Formuleer één centrale onderzoeksvraag die helder en beantwoordbaar is. Voeg indien nodig subvragen toe die helpen om de hoofdvraag stapsgewijs te beantwoorden.`,
            theorie: [
                {
                    concept: "FINER Criteria",
                    uitleg: "Een goede vraag is: Feasible (Uitvoerbaar), Interesting (Interessant), Novel (Vernieuwend), Ethical (Ethisch), Relevant.",
                    praktijk: "Test je vraag tegen deze 5 punten.",
                    bron: "College 4 - dia 22"
                },
                {
                    concept: "Vraagtypen",
                    uitleg: "Beschrijvend (Wat is...?), Vergelijkend (Wat is het verschil tussen...?), of Verklarend (Hoe beïnvloedt X de variabele Y?).",
                    praktijk: "In PO vaak vergelijkend of verklarend.",
                    bron: "College 6 - dia 5-12"
                }
            ],
            toepassing: {
                stappen: [
                    "Zorg dat de vraag niet met 'ja' of 'nee' beantwoord kan worden.",
                    "Definieer je populatie (wie?) en variabelen (wat?) in de vraag.",
                    "Subvragen moeten de hoofdvraag 'opdelen' in hapklare brokken."
                ],
                voorbeelden: ["In welke mate beïnvloedt haptische feedback de foutmarge van chirurgen bij remote robot-operaties?", "Welke interface-elementen bevorderen de autonomie van ouderen bij het gebruik van smart-home technologie?"],
                fouten: ["Vraag is te complex voor één onderzoek.", "Vraag is eigenlijk een ontwerpvraag ('Hoe maak ik...') in plaats van een onderzoeksvraag ('Wat is de invloed van...')."]
            }
        },
        methodologie: {
            title: "3. Methodologie",
            opdracht: `Beschrijf je aanpak: Welke onderzoeksstrategie kies je? Waarom is deze geschikt? Hoe ziet de steekproef eruit? Welke software of tools gebruik je? Hoe integreer je ethiek (GDPR, informed consent)?`,
            theorie: [
                {
                    concept: "Onderzoeksstrategieën",
                    uitleg: "Kies uit: Experimenteel (oorzaak-gevolg), Correlationeel (relaties), of Beschrijvend (status-quo).",
                    praktijk: "A/B testing is een vorm van experimenteel onderzoek.",
                    bron: "College 6 - dia 4"
                },
                {
                    concept: "Kwaliteitscriteria: Validiteit & Betrouwbaarheid",
                    uitleg: "Interne Validiteit: meet je echt wat je wilt meten? Externe Validiteit: zijn resultaten generaliseerbaar? Betrouwbaarheid: levert herhaling hetzelfde resultaat op?",
                    praktijk: "Beschrijf hoe je deze waarborgt.",
                    bron: "College 5 - dia 41"
                },
                {
                    concept: "Ethische Kernwaarden",
                    uitleg: "Respect (autonomie), Welzijn (do no harm), Rechtvaardigheid, Integriteit.",
                    praktijk: "Cruciaal bij onderzoek met mensen.",
                    bron: "College 6 - dia 62"
                }
            ],
            toepassing: {
                stappen: [
                    "Kies je strategie (bv. Survey of User Test).",
                    "Beschrijf je participanten (steekproef): Wie, hoeveel, hoe bereik je ze?",
                    "Dataverzameling: Welke stappen zet je concreet?",
                    "Data-analyse: Hoe ga je de resultaten interpreteren?",
                    "Ethiek: Voeg een paragraaf toe over anonimiteit en toestemming."
                ],
                fouten: ["Te vaag over de uitvoering ('We gaan mensen interviewen' is niet genoeg).", "Vergeten de methodiekeuze te motiveren vanuit de theorie."]
            }
        },
        resultaten: {
            title: "4. Verwachte Resultaten",
            opdracht: `Wat hoop je te ontdekken? Hoe zullen deze resultaten helpen bij het ontwerp? Denk aan grafieken, persona's of ontwerp-richtlijnen die hieruit kunnen voortvloeien.`,
            theorie: [
                {
                    concept: "Impact op Ontwerp",
                    uitleg: "In toegepast onderzoek moet de output direct bruikbaar zijn voor de ontwerper. Het gaat om 'Research-Informed Design'.",
                    praktijk: "Vertaal data naar actiepunten.",
                    bron: "College 10 - dia 8"
                }
            ],
            toepassing: {
                stappen: [
                    "Beschrijf welk type data je verwacht (kwantitatief/kwalitatief).",
                    "Geef aan hoe deze data beslissingen in het ontwerpproces gaat sturen.",
                    "Noem concrete deliverables (bv. 'Een set van 5 design principles voor inclusieve apps')."
                ]
            }
        },
        referenties: {
            title: "5. Referenties",
            opdracht: `Gebruik de APA-referentiestijl voor zowel in-tekst referenties als de referentielijst op het einde. Minimaal 5 wetenschappelijke bronnen.`,
            theorie: [
                {
                    concept: "APA 7 Stijl",
                    uitleg: "In-tekst: (Auteur, Jaar). Lijst: Auteur, A. A. (Jaar). Titel van artikel. Titel van Tijdschrift, Vol(Issue), pagina's.",
                    praktijk: "Consistentie is essentieel.",
                    bron: "College 3 - dia 16"
                }
            ],
            toepassing: {
                stappen: [
                    "Verzamel bronnen via Google Scholar of de UA Bibliotheek.",
                    "Gebruik een tool als Zotero of Mendeley voor consistentie.",
                    "Check elk citaat in je tekst tegen de eindlijst."
                ],
                voorbeeldzinnen: ["'Kleuren spelen een cruciale rol in design (Mirzaei, 2025).'", "'Fialkowski en Schofield (2024) stellen dat...'"]
            }
        },
        settings: {
            title: "Instellingen",
            isSettings: true
        }
    };

    let currentSection = 'titel';
    let currentTab = 'opdracht';

    // CORE LOGIC
    function loadSection(id) {
        currentSection = id;
        document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        
        if (sections[id].isSettings) {
            renderSettings();
            document.getElementById('tabs').style.display = 'none';
        } else {
            document.getElementById('tabs').style.display = 'flex';
            renderContent();
        }
    }

    function showTab(tabId) {
        currentTab = tabId;
        document.querySelectorAll('.tab').forEach(el => el.classList.remove('active'));
        event.currentTarget.classList.add('active');
        renderContent();
    }

    function renderContent() {
        const data = sections[currentSection];
        const container = document.getElementById('content-body');
        let html = `<h1>${data.title}</h1>`;

        if (currentTab === 'opdracht') {
            html += `<div class="assignment-box"><h3>Opdracht uit PDF:</h3>${data.opdracht}</div>`;
            html += `<p><i>Klik op de tab 'Theorie' om de wetenschappelijke onderbouwing te zien, of 'Toepassing' voor een stap-voor-stap gids.</i></p>`;
        } 
        else if (currentTab === 'theorie') {
            data.theorie.forEach(t => {
                html += `
                <div class="theory-block">
                    <h3>${t.concept}</h3>
                    <p>${t.uitleg}</p>
                    <p><strong>Praktische betekenis:</strong> ${t.praktijk}</p>
                    <span class="source">Bron: ${t.bron}</span>
                </div>`;
            });
        }
        else if (currentTab === 'toepassing') {
            html += `<h2>Stap-voor-stap Aanpak</h2>`;
            data.toepassing.stappen.forEach(s => html += `<div class="step-box">${s}</div>`);
            
            if (data.toepassing.voorbeelden) {
                html += `<h2>Voorbeelden</h2>`;
                data.toepassing.voorbeelden.forEach(v => html += `<div class="example-box">"${v}"</div>`);
            }

            if (data.toepassing.fouten) {
                html += `<h2>Typische Fouten</h2>`;
                data.toepassing.fouten.forEach(f => html += `<div class="warning-box">⚠️ ${f}</div>`);
            }
        }

        container.innerHTML = html;
    }

    // SETTINGS LOGIC
    function renderSettings() {
        const container = document.getElementById('content-body');
        container.innerHTML = `
            <h1>Instellingen</h1>
            <div class="settings-grid">
                <div class="setting-card">
                    <h3>Thema</h3>
                    <button onclick="setTheme('light')">Licht</button>
                    <button onclick="setTheme('dark')">Donker</button>
                </div>
                <div class="setting-card">
                    <h3>Tekstgrootte</h3>
                    <button onclick="setFont('14px')">Klein</button>
                    <button onclick="setFont('16px')">Normaal</button>
                    <button onclick="setFont('20px')">Groot</button>
                </div>
                <div class="setting-card">
                    <h3>Layout</h3>
                    <button onclick="setLayout('normal')">Standaard</button>
                    <button onclick="setLayout('compact')">Compact</button>
                </div>
                <div class="setting-card">
                    <h3>Focus Mode</h3>
                    <button onclick="toggleFocus(true)">Activeer Focus Mode</button>
                </div>
            </div>
        `;
    }

    function setTheme(mode) {
        if (mode === 'dark') document.body.classList.add('dark-mode');
        else document.body.classList.remove('dark-mode');
        localStorage.setItem('theme', mode);
    }

    function setFont(size) {
        document.documentElement.style.setProperty('--font-size', size);
        localStorage.setItem('font-size', size);
    }

    function setLayout(mode) {
        if (mode === 'compact') document.body.classList.add('compact');
        else document.body.classList.remove('compact');
        localStorage.setItem('layout', mode);
    }

    function toggleFocus(on) {
        const sidebar = document.getElementById('sidebar');
        const focusHeader = document.getElementById('focus-header');
        if (on) {
            sidebar.classList.add('hidden');
            focusHeader.style.display = 'flex';
            document.getElementById('focus-title').innerText = sections[currentSection].title;
        } else {
            sidebar.classList.remove('hidden');
            focusHeader.style.display = 'none';
        }
    }

    // INITIAL LOAD
    window.onload = () => {
        // Load saved settings
        if (localStorage.getItem('theme') === 'dark') setTheme('dark');
        if (localStorage.getItem('font-size')) setFont(localStorage.getItem('font-size'));
        if (localStorage.getItem('layout') === 'compact') setLayout('compact');
        
        loadSection('titel');
    };
</script>

</body>
</html>
